<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clean white background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="#ffffff" />
  
  <!-- Thick connections for visibility -->
  <line x1="50" y1="20" x2="20" y2="75" stroke="#4b4453" stroke-width="12" stroke-linecap="round" />
  <line x1="50" y1="20" x2="80" y2="75" stroke="#4b4453" stroke-width="12" stroke-linecap="round" />
  <line x1="20" y1="75" x2="80" y2="75" stroke="#4b4453" stroke-width="12" stroke-linecap="round" />
  
  <!-- Large bold nodes using the project's color palette -->
  <circle cx="50" cy="20" r="20" fill="#ff8066" />
  <circle cx="20" cy="75" r="20" fill="#845ec2" />
  <circle cx="80" cy="75" r="20" fill="#845ec2" />
</svg>
